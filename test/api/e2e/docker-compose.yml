version: '3.8'

services:
  fuzztesting-master:
    image: fuzztesting/master:latest
    build:
      context: ../../../
      dockerfile: Dockerfile
      target: master
    ports:
      - "8080:8080"
    environment:
      - fuzztesting_CONFIG=/app/master.yaml
    volumes:
      - ../../../master.yaml:/app/master.yaml:ro
      - ../../../storage:/app/storage
      - ../../../test-resources:/test-resources:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - fuzztesting-e2e

  fuzztesting-bot:
    image: fuzztesting/bot:latest
    build:
      context: ../../../
      dockerfile: Dockerfile
      target: bot
    environment:
      - fuzztesting_CONFIG=/app/bot.yaml
    volumes:
      - ../../../bot.yaml:/app/bot.yaml:ro
      - ../../../storage:/app/storage
      - ../../../test-resources:/test-resources:ro
    depends_on:
      fuzztesting-master:
        condition: service_healthy
    networks:
      - fuzztesting-e2e
    
  e2e-tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      - fuzztesting_API_URL=http://fuzztesting-master:8080/api/v1
      - CI=true
    volumes:
      - ./test-results:/app/test-results
      - ./playwright-report:/app/playwright-report
    depends_on:
      fuzztesting-master:
        condition: service_healthy
    networks:
      - fuzztesting-e2e
    profiles:
      - test

networks:
  fuzztesting-e2e:
    driver: bridge

volumes:
  fuzztesting-storage:
    driver: local