  # Corpus Management
  /corpus:
    get:
      tags: [corpus]
      summary: List corpus entries
      description: Retrieve a paginated list of corpus entries with optional filtering
      operationId: listCorpus
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/FieldsParam'
        - name: campaign_id
          in: query
          description: Filter by campaign ID
          schema:
            type: string
            format: uuid
        - name: job_id
          in: query
          description: Filter by job ID
          schema:
            type: string
            format: uuid
        - name: min_coverage
          in: query
          description: Minimum coverage threshold
          schema:
            type: integer
            minimum: 0
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Successfully retrieved corpus entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorpusListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [corpus]
      summary: Upload corpus files
      description: Upload multiple corpus files to a campaign
      operationId: uploadCorpus
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - campaign_id
                - files
              properties:
                campaign_id:
                  type: string
                  format: uuid
                  description: Target campaign ID
                job_id:
                  type: string
                  format: uuid
                  description: Optional job ID for context
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Corpus files to upload
                  minItems: 1
                  maxItems: 1000
                tags:
                  type: string
                  description: Comma-separated tags for the corpus files
                  example: "seed,minimal,edge-case"
      responses:
        '201':
          description: Corpus files successfully uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorpusUploadResponse'
              example:
                uploaded_count: 95
                duplicate_count: 5
                total_size_bytes: 2048576
                upload_id: "01234567-89ab-cdef-0123-456789abcdef"
                errors: []
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /corpus/{entryId}:
    parameters:
      - $ref: '#/components/parameters/CorpusEntryIdParam'

    get:
      tags: [corpus]
      summary: Get corpus entry details
      description: Retrieve detailed information about a specific corpus entry
      operationId: getCorpusEntry
      parameters:
        - $ref: '#/components/parameters/FieldsParam'
      responses:
        '200':
          description: Successfully retrieved corpus entry details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorpusEntry'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [corpus]
      summary: Delete corpus entry
      description: Remove a corpus entry from the system
      operationId: deleteCorpusEntry
      responses:
        '204':
          description: Corpus entry successfully deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /corpus/{entryId}/download:
    parameters:
      - $ref: '#/components/parameters/CorpusEntryIdParam'

    get:
      tags: [corpus]
      summary: Download corpus file
      description: Download the binary content of a corpus file
      operationId: downloadCorpusFile
      responses:
        '200':
          description: Corpus file content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              schema:
                type: string
              description: Filename for download
              example: 'attachment; filename="corpus_entry_123.bin"'
            Content-Length:
              schema:
                type: integer
              description: File size in bytes
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /corpus/sync:
    post:
      tags: [corpus]
      summary: Synchronize corpus
      description: Synchronize corpus between campaigns or jobs
      operationId: syncCorpus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CorpusSyncRequest'
            example:
              source_campaign_id: "01234567-89ab-cdef-0123-456789abcdef"
              target_campaign_id: "fedcba98-7654-3210-fedc-ba9876543210"
              sync_strategy: "coverage_based"
              min_coverage: 1000
              max_files: 500
      responses:
        '200':
          description: Corpus synchronization completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorpusSyncResponse'
              example:
                sync_id: "01234567-89ab-cdef-0123-456789abcdef"
                synced_files: 150
                total_size_bytes: 3145728
                duration_seconds: 45
                strategy_used: "coverage_based"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /corpus/quarantine:
    get:
      tags: [corpus]
      summary: List quarantined corpus entries
      description: Retrieve entries that have been quarantined due to analysis results
      operationId: listQuarantinedCorpus
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - name: reason
          in: query
          description: Filter by quarantine reason
          schema:
            type: string
            enum: [malformed, timeout, crash, suspicious]
      responses:
        '200':
          description: Successfully retrieved quarantined corpus entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorpusListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /corpus/selection:
    post:
      tags: [corpus]
      summary: Select corpus subset
      description: Select an optimal subset of corpus for a specific purpose
      operationId: selectCorpus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CorpusSelectionRequest'
            example:
              campaign_id: "01234567-89ab-cdef-0123-456789abcdef"
              selection_strategy: "coverage_maximizing"
              max_entries: 100
              min_coverage: 500
              criteria:
                prefer_small_files: true
                include_edge_cases: true
      responses:
        '200':
          description: Corpus selection completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorpusSelectionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /corpus/collections:
    get:
      tags: [corpus]
      summary: List corpus collections
      description: Retrieve a list of all corpus collections
      operationId: listCorpusCollections
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Successfully retrieved corpus collections
          content:
            application/json:
              schema:
                type: object
                properties:
                  collections:
                    type: array
                    items:
                      $ref: '#/components/schemas/CorpusCollection'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [corpus]
      summary: Create corpus collection
      description: Create a new corpus collection for organizing seed files
      operationId: createCorpusCollection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CorpusCollectionCreateRequest'
      responses:
        '201':
          description: Corpus collection created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorpusCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /corpus/collections/{collectionId}:
    parameters:
      - name: collectionId
        in: path
        required: true
        description: Corpus collection ID
        schema:
          type: string
          format: uuid

    get:
      tags: [corpus]
      summary: Get corpus collection
      description: Retrieve a specific corpus collection by ID
      operationId: getCorpusCollection
      responses:
        '200':
          description: Corpus collection details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorpusCollection'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags: [corpus]
      summary: Update corpus collection
      description: Update a corpus collection's metadata
      operationId: updateCorpusCollection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CorpusCollectionUpdateRequest'
      responses:
        '200':
          description: Corpus collection updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorpusCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [corpus]
      summary: Delete corpus collection
      description: Delete a corpus collection and optionally its files
      operationId: deleteCorpusCollection
      responses:
        '204':
          description: Corpus collection deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /corpus/collections/{collectionId}/upload:
    parameters:
      - name: collectionId
        in: path
        required: true
        description: Corpus collection ID
        schema:
          type: string
          format: uuid

    post:
      tags: [corpus]
      summary: Upload files to corpus collection
      description: Upload one or more files to a corpus collection
      operationId: uploadCorpusCollectionFiles
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '201':
          description: Files uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  uploaded_count:
                    type: integer
                  files:
                    type: array
                    items:
                      $ref: '#/components/schemas/CorpusCollectionFile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /corpus/collections/{collectionId}/files:
    parameters:
      - name: collectionId
        in: path
        required: true
        description: Corpus collection ID
        schema:
          type: string
          format: uuid

    get:
      tags: [corpus]
      summary: List files in corpus collection
      description: Retrieve all files in a corpus collection
      operationId: listCorpusCollectionFiles
      responses:
        '200':
          description: List of files in the collection
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      $ref: '#/components/schemas/CorpusCollectionFile'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Crash Management
  /crashes:
    get:
      tags: [crashes]
      summary: List crashes
      description: Retrieve a paginated list of crashes with optional filtering
      operationId: listCrashes
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/FieldsParam'
        - name: campaign_id
          in: query
          description: Filter by campaign ID
          schema:
            type: string
            format: uuid
        - name: job_id
          in: query
          description: Filter by job ID
          schema:
            type: string
            format: uuid
        - name: unique_only
          in: query
          description: Only return unique crashes
          schema:
            type: boolean
            default: false
        - name: crash_type
          in: query
          description: Filter by crash type
          schema:
            $ref: '#/components/schemas/CrashType'
        - name: severity
          in: query
          description: Filter by crash severity
          schema:
            $ref: '#/components/schemas/CrashSeverity'
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Successfully retrieved crashes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrashListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [crashes]
      summary: Report a crash
      description: Report a new crash discovered during fuzzing
      operationId: createCrash
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrashRequest'
      responses:
        '201':
          description: Crash successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrashSubmitResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Duplicate crash detected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrashSubmitResponse'
        '413':
          description: Request entity too large (input_data exceeds 10MB)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /crashes/{crashId}:
    parameters:
      - $ref: '#/components/parameters/CrashIdParam'

    get:
      tags: [crashes]
      summary: Get crash details
      description: Retrieve detailed information about a specific crash
      operationId: getCrash
      parameters:
        - $ref: '#/components/parameters/FieldsParam'
      responses:
        '200':
          description: Successfully retrieved crash details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Crash'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /crashes/{crashId}/minimize:
    parameters:
      - $ref: '#/components/parameters/CrashIdParam'

    post:
      tags: [crashes]
      summary: Minimize crash input
      description: Create a job to minimize the crash-triggering input
      operationId: minimizeCrash
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                strategy:
                  type: string
                  enum: [binary_search, delta_debugging, hierarchical]
                  default: delta_debugging
                timeout_seconds:
                  type: integer
                  minimum: 60
                  maximum: 3600
                  default: 600
                priority:
                  type: integer
                  minimum: 1
                  maximum: 10
                  default: 5
      responses:
        '202':
          description: Minimization job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [queued]
                  estimated_completion:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Crash already being minimized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /crashes/{crashId}/deduplicate:
    parameters:
      - $ref: '#/components/parameters/CrashIdParam'

    post:
      tags: [crashes]
      summary: Deduplicate crash
      description: Find and group similar crashes using various deduplication algorithms
      operationId: deduplicateCrash
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                algorithm:
                  type: string
                  enum: [stack_trace, hash_based, fuzzy_matching]
                  default: stack_trace
                threshold:
                  type: number
                  minimum: 0.0
                  maximum: 1.0
                  default: 0.8
                  description: Similarity threshold for fuzzy matching
      responses:
        '200':
          description: Deduplication completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrashDeduplicationResponse'
              example:
                crash_id: "01234567-89ab-cdef-0123-456789abcdef"
                is_unique: false
                duplicate_of: "fedcba98-7654-3210-fedc-ba9876543210"
                similarity_score: 0.95
                algorithm_used: "stack_trace"
                group_id: "crash-group-001"
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /crashes/{crashId}/reproduce:
    parameters:
      - $ref: '#/components/parameters/CrashIdParam'

    post:
      tags: [crashes]
      summary: Reproduce crash
      description: Create a job to reproduce and verify the crash
      operationId: reproduceCrash
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                attempts:
                  type: integer
                  minimum: 1
                  maximum: 10
                  default: 3
                timeout_seconds:
                  type: integer
                  minimum: 30
                  maximum: 600
                  default: 300
                environment:
                  type: object
                  additionalProperties:
                    type: string
                  description: Environment variables for reproduction
      responses:
        '202':
          description: Reproduction job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [queued]
                  attempts_scheduled:
                    type: integer
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

