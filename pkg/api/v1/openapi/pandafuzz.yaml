          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /campaigns/{campaignId}/stats:
    parameters:
      - $ref: '#/components/parameters/CampaignIdParam'

