openapi: 3.0.3
info:
  title: fuzztesting API
  version: 1.0.0
  description: |
    fuzztesting distributed fuzzing orchestration platform API.
    
    This API provides comprehensive access to all platform features including:
    - Bot management and orchestration
    - Job lifecycle management
    - Campaign coordination
    - Corpus synchronization and management
    - Crash analysis and deduplication
    - Real-time analytics and monitoring
    
    ## Authentication
    The API supports both JWT Bearer tokens and API keys for authentication.
    
    ## Rate Limiting
    API endpoints are rate-limited based on authentication method:
    - Authenticated requests: 1000 requests per hour
    - Unauthenticated requests: 100 requests per hour
    
    ## Pagination
    List endpoints support both offset-based and cursor-based pagination.
    
    ## Field Selection
    Use the `fields` query parameter to specify which fields to include in responses.
  contact:
    name: fuzztesting Team
    url: https://github.com/Yuvi9559/FuzzTesting
    email: support@ethpandaops.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server
  - url: https://fuzztesting.staging.ethpandaops.io/api/v1
    description: Staging environment
  - url: https://fuzztesting.ethpandaops.io/api/v1
    description: Production environment

security:
  - bearerAuth: []
  - apiKeyAuth: []

tags:
  - name: bots
    description: Bot agent management and orchestration
  - name: jobs
    description: Fuzzing job lifecycle management
  - name: campaigns
    description: Campaign coordination and management
  - name: corpus
    description: Corpus synchronization and management
  - name: crashes
    description: Crash analysis and deduplication
  - name: analytics
    description: Performance metrics and analytics
  - name: events
    description: Real-time event streaming
  - name: batch
    description: Batch operations for performance
  - name: health
    description: System health and monitoring

paths:
  # Health and System Status
  /health:
    get:
      tags: [health]
      summary: System health check
      description: Check the overall health status of the fuzztesting system
      operationId: getHealth
      security: []
      responses:
        '200':
          description: System is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              example:
                status: healthy
                timestamp: "2024-01-15T10:30:00Z"
                version: "1.0.0"
                uptime: "PT72H30M15S"
                checks:
                  database:
                    status: healthy
                    latency_ms: 2
                  storage:
                    status: healthy
                    available_space_gb: 500
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /ready:
    get:
      tags: [health]
      summary: Readiness probe
      description: Check if the system is ready to accept requests
      operationId: getReadiness
      security: []
      responses:
        '200':
          description: System is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessStatus'
              example:
                ready: true
                timestamp: "2024-01-15T10:30:00Z"
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  # Bot Management
  /bots:
    get:
      tags: [bots]
      summary: List bots
      description: Retrieve a paginated list of registered bots with optional filtering
      operationId: listBots
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/FieldsParam'
        - name: status
          in: query
          description: Filter by bot status
          schema:
            $ref: '#/components/schemas/BotStatus'
        - name: capabilities
          in: query
          description: Filter by bot capabilities (comma-separated)
          schema:
            type: string
            example: "fuzzing,analysis"
        - name: online_only
          in: query
          description: Only return online bots
          schema:
            type: boolean
            default: false
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Successfully retrieved bots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BotListResponse'
              example:
                data:
                  - id: "01234567-89ab-cdef-0123-456789abcdef"
                    name: "fuzzer-bot-01"
                    hostname: "worker-001.internal"
                    status: idle
                    capabilities: ["fuzzing", "analysis"]
                    last_heartbeat: "2024-01-15T10:30:00Z"
                    is_online: true
                    current_job_id: null
                    registered_at: "2024-01-15T08:00:00Z"
                pagination:
                  total: 150
                  limit: 50
                  offset: 0
                  has_more: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [bots]
      summary: Register a new bot
      description: Register a new bot agent with the system
      operationId: createBot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BotCreateRequest'
            example:
              name: "fuzzer-bot-02"
              hostname: "worker-002.internal"
              capabilities: ["fuzzing", "analysis"]
              api_endpoint: "http://worker-002.internal:8081"
              metadata:
                region: "us-west-2"
                instance_type: "c5.xlarge"
      responses:
        '201':
          description: Bot successfully registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bot'
              example:
                id: "01234567-89ab-cdef-0123-456789abcdef"
                name: "fuzzer-bot-02"
                hostname: "worker-002.internal"
                status: idle
                capabilities: ["fuzzing", "analysis"]
                last_heartbeat: "2024-01-15T10:30:00Z"
                is_online: true
                current_job_id: null
                registered_at: "2024-01-15T10:30:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /bots/{botId}:
    parameters:
      - $ref: '#/components/parameters/BotIdParam'

    get:
      tags: [bots]
      summary: Get bot details
      description: Retrieve detailed information about a specific bot
      operationId: getBot
      parameters:
        - $ref: '#/components/parameters/FieldsParam'
      responses:
        '200':
          description: Successfully retrieved bot details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bot'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags: [bots]
      summary: Update bot
      description: Update bot information and configuration
      operationId: updateBot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BotUpdateRequest'
      responses:
        '200':
          description: Bot successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bot'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [bots]
      summary: Unregister bot
      description: Remove a bot from the system
      operationId: deleteBot
      responses:
        '204':
          description: Bot successfully unregistered
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Cannot delete bot with active jobs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /bots/{botId}/heartbeat:
    parameters:
      - $ref: '#/components/parameters/BotIdParam'

    post:
      tags: [bots]
      summary: Send bot heartbeat
      description: Update bot status and last seen timestamp
      operationId: sendBotHeartbeat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BotHeartbeatRequest'
            example:
              status: busy
              current_job_id: "01234567-89ab-cdef-0123-456789abcdef"
              resource_usage:
                cpu_percent: 75.5
                memory_bytes: 2147483648
                disk_usage_bytes: 10737418240
      responses:
        '200':
          description: Heartbeat acknowledged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BotHeartbeatResponse'
              example:
                acknowledged: true
                next_heartbeat_interval_seconds: 30
                assigned_job_id: "01234567-89ab-cdef-0123-456789abcdef"
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /bots/{botId}/jobs:
    parameters:
      - $ref: '#/components/parameters/BotIdParam'

    get:
      tags: [bots]
      summary: Get bot jobs
      description: Retrieve jobs assigned to or executed by this bot
      operationId: getBotJobs
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - name: status
          in: query
          description: Filter by job status
          schema:
            $ref: '#/components/schemas/JobStatus'
      responses:
        '200':
          description: Successfully retrieved bot jobs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Job Management
  /jobs:
    get:
      tags: [jobs]
      summary: List jobs
      description: Retrieve a paginated list of jobs with optional filtering
      operationId: listJobs
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/FieldsParam'
        - name: status
          in: query
          description: Filter by job status
          schema:
            $ref: '#/components/schemas/JobStatus'
        - name: campaign_id
          in: query
          description: Filter by campaign ID
          schema:
            type: string
            format: uuid
        - name: bot_id
          in: query
          description: Filter by assigned bot ID
          schema:
            type: string
            format: uuid
        - name: fuzzer
          in: query
          description: Filter by fuzzer type
          schema:
            $ref: '#/components/schemas/FuzzerType'
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Successfully retrieved jobs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobListResponse'
              example:
                data:
                  - id: "01234567-89ab-cdef-0123-456789abcdef"
                    name: "libfuzzer-test-job"
                    status: running
                    fuzzer: libfuzzer
                    campaign_id: "01234567-89ab-cdef-0123-456789abcdef"
                    assigned_bot_id: "01234567-89ab-cdef-0123-456789abcdef"
                    created_at: "2024-01-15T10:00:00Z"
                    started_at: "2024-01-15T10:05:00Z"
                    timeout_at: "2024-01-15T11:00:00Z"
                pagination:
                  total: 75
                  limit: 20
                  offset: 0
                  has_more: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [jobs]
      summary: Create a new job
      description: Submit a new fuzzing job to the system
      operationId: createJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobCreateRequest'
            example:
              name: "libfuzzer-target-test"
              fuzzer: libfuzzer
              target_binary: "/path/to/target"
              campaign_id: "01234567-89ab-cdef-0123-456789abcdef"
              timeout_seconds: 3600
              config:
                max_total_time: 3600
                max_len: 1024
                use_value_profile: true
              enable_coverage: true
      responses:
        '201':
          description: Job successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /jobs/{jobId}:
    parameters:
      - $ref: '#/components/parameters/JobIdParam'

    get:
      tags: [jobs]
      summary: Get job details
      description: Retrieve detailed information about a specific job
      operationId: getJob
      parameters:
        - $ref: '#/components/parameters/FieldsParam'
      responses:
        '200':
          description: Successfully retrieved job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags: [jobs]
      summary: Update job
      description: Update job configuration and parameters
      operationId: updateJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobUpdateRequest'
      responses:
        '200':
          description: Job successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Cannot update running job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [jobs]
      summary: Cancel job
      description: Cancel a pending or running job
      operationId: deleteJob
      responses:
        '204':
          description: Job successfully cancelled
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Cannot cancel completed job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /jobs/{jobId}/logs:
    parameters:
      - $ref: '#/components/parameters/JobIdParam'

    get:
      tags: [jobs]
      summary: Get job logs
      description: Retrieve execution logs for a job
      operationId: getJobLogs
      parameters:
        - name: follow
          in: query
          description: Stream logs in real-time (Server-Sent Events)
          schema:
            type: boolean
            default: false
        - name: tail
          in: query
          description: Number of lines to return from the end
          schema:
            type: integer
            minimum: 1
            maximum: 10000
            default: 1000
        - name: since
          in: query
          description: Only return logs after this timestamp
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Successfully retrieved job logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobLogsResponse'
            text/event-stream:
              schema:
                type: string
                description: Server-sent events stream for real-time logs
              example: |
                data: {"timestamp": "2024-01-15T10:30:00Z", "level": "info", "message": "Starting fuzzing session"}
                
                data: {"timestamp": "2024-01-15T10:30:01Z", "level": "info", "message": "Loaded 100 seed inputs"}
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /jobs/{jobId}/coverage:
    parameters:
      - $ref: '#/components/parameters/JobIdParam'

    get:
      tags: [jobs]
      summary: Get job coverage reports
      description: Retrieve coverage reports generated by a job
      operationId: getJobCoverage
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - name: format
          in: query
          description: Filter by coverage report format
          schema:
            $ref: '#/components/schemas/CoverageFormat'
      responses:
        '200':
          description: Successfully retrieved coverage reports
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoverageReportListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /jobs/{jobId}/coverage/{reportId}:
    parameters:
      - $ref: '#/components/parameters/JobIdParam'
      - $ref: '#/components/parameters/ReportIdParam'

    get:
      tags: [jobs]
      summary: Download coverage report
      description: Download a specific coverage report file
      operationId: downloadCoverageReport
      responses:
        '200':
          description: Coverage report file
          content:
            application/json:
              schema:
                type: object
                description: JSON coverage report
            text/html:
              schema:
                type: string
                description: HTML coverage report
            text/plain:
              schema:
                type: string
                description: LCOV or text coverage report
            application/octet-stream:
              schema:
                type: string
                format: binary
                description: Binary coverage report
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /jobs/{jobId}/coverage/raw:
    parameters:
      - $ref: '#/components/parameters/JobIdParam'

    get:
      tags: [jobs]
      summary: List raw AFL++ coverage files
      description: List available raw coverage files (fuzzer_stats, plot_data, fuzz_bitmap) for an AFL++ job
      operationId: listRawCoverage
      responses:
        '200':
          description: Successfully retrieved raw coverage file list
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: [fuzzer_stats, plot_data, fuzz_bitmap]
                        available:
                          type: boolean
                        size:
                          type: integer
                        last_modified:
                          type: string
                          format: date-time
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /jobs/{jobId}/coverage/raw/{fileType}:
    parameters:
      - $ref: '#/components/parameters/JobIdParam'
      - name: fileType
        in: path
        required: true
        description: Type of raw coverage file to download
        schema:
          type: string
          enum: [fuzzer_stats, plot_data, fuzz_bitmap]

    get:
      tags: [jobs]
      summary: Download raw AFL++ coverage file
      description: Download a specific raw coverage file from an AFL++ job
      operationId: downloadRawCoverageFile
      responses:
        '200':
          description: Raw coverage file content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /jobs/{jobId}/coverage/raw/all/zip:
    parameters:
      - $ref: '#/components/parameters/JobIdParam'

    get:
      tags: [jobs]
      summary: Download all raw coverage files as ZIP
      description: Download all available raw coverage files for an AFL++ job in a single ZIP archive
      operationId: downloadRawCoverageZip
      responses:
        '200':
          description: ZIP archive containing raw coverage files
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /jobs/{jobId}/artifacts:
    parameters:
      - $ref: '#/components/parameters/JobIdParam'

    get:
      tags: [jobs]
      summary: List job artifacts
      description: Retrieve artifacts generated by a job (crashes, corpus files, etc.)
      operationId: getJobArtifacts
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - name: type
          in: query
          description: Filter by artifact type
          schema:
            type: string
            enum: [crash, corpus, coverage, log]
      responses:
        '200':
          description: Successfully retrieved job artifacts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Campaign Management
  /campaigns:
    get:
      tags: [campaigns]
      summary: List campaigns
      description: Retrieve a paginated list of campaigns with optional filtering
      operationId: listCampaigns
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/FieldsParam'
        - name: status
          in: query
          description: Filter by campaign status
          schema:
            $ref: '#/components/schemas/CampaignStatus'
        - name: tags
          in: query
          description: Filter by tags (comma-separated)
          schema:
            type: string
            example: "security,performance"
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Successfully retrieved campaigns
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [campaigns]
      summary: Create a new campaign
      description: Create a new fuzzing campaign
      operationId: createCampaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignCreateRequest'
            example:
              name: "HTTP Parser Security Test"
              description: "Comprehensive security testing of HTTP parser implementation"
              target_binary: "/usr/bin/http-parser"
              tags: ["security", "parser", "http"]
              max_duration_seconds: 86400
              job_template:
                fuzzer: libfuzzer
                timeout_seconds: 3600
                config:
                  max_total_time: 3600
                  max_len: 4096
      responses:
        '201':
          description: Campaign successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /campaigns/{campaignId}:
    parameters:
      - $ref: '#/components/parameters/CampaignIdParam'

    get:
      tags: [campaigns]
      summary: Get campaign details
      description: Retrieve detailed information about a specific campaign
      operationId: getCampaign
      parameters:
        - $ref: '#/components/parameters/FieldsParam'
      responses:
        '200':
          description: Successfully retrieved campaign details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags: [campaigns]
      summary: Update campaign
      description: Update campaign configuration and settings
      operationId: updateCampaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignUpdateRequest'
      responses:
        '200':
          description: Campaign successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [campaigns]
      summary: Delete campaign
      description: Delete a campaign and all associated data
      operationId: deleteCampaign
      responses:
        '204':
          description: Campaign successfully deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Cannot delete campaign with active jobs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /campaigns/{campaignId}/start:
    parameters:
      - $ref: '#/components/parameters/CampaignIdParam'

    post:
      tags: [campaigns]
      summary: Start campaign
      description: Start or resume a campaign
      operationId: startCampaign
      responses:
        '200':
          description: Campaign successfully started
          content:
